<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t">
<title id="t">AI transforming data quality from micro-tests to context-aware quality with knowledge graphs</title>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#1b2540"/></linearGradient>
<linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
<radialGradient id="gb"><stop offset="0" stop-color="#2563eb" stop-opacity="0.22"/><stop offset="1" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
<radialGradient id="gg"><stop offset="0" stop-color="#34d399" stop-opacity="0.18"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></radialGradient>
<pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-opacity="0.06"/></pattern>
</defs>
<rect width="1200" height="600" fill="url(#bg)"/>
<rect width="1200" height="600" fill="url(#grid)"/>
<ellipse cx="360" cy="300" rx="420" ry="320" fill="url(#gb)"/>
<ellipse cx="960" cy="280" rx="400" ry="300" fill="url(#gg)"/>
<g font-family="Segoe UI, system-ui, sans-serif">
<!-- divider -->
<line x1="600" y1="60" x2="600" y2="540" stroke="#2b3a5c" stroke-width="1" stroke-dasharray="8 6"/>
<text x="600" y="30" text-anchor="middle" font-size="13" letter-spacing="5" fill="#475569">OLD vs NEW</text>

<!-- traditional DQ side -->
<text x="300" y="90" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="3" fill="#64748b">TRADITIONAL DQ</text>
<text x="300" y="112" text-anchor="middle" font-size="12" fill="#475569">Micro-tests per column</text>
<g>
<rect x="80" y="140" width="440" height="60" rx="12" fill="#111a30" stroke="#2b3a5c"/>
<rect x="80" y="140" width="440" height="60" rx="12" fill="#1e293b" opacity="0.5"/>
<rect x="100" y="156" width="28" height="28" rx="6" fill="#16223f" stroke="#2b3a5c"/>
<path d="M110 173 l6 6 12-12" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="145" y="176" font-size="14" font-weight="600" fill="#94a3b8">NOT NULL</text>
<text x="260" y="176" font-size="12" fill="#64748b">user.email NOT NULL</text>
</g>
<g>
<rect x="80" y="216" width="440" height="60" rx="12" fill="#111a30" stroke="#2b3a5c"/>
<rect x="80" y="216" width="440" height="60" rx="12" fill="#1e293b" opacity="0.5"/>
<rect x="100" y="232" width="28" height="28" rx="6" fill="#16223f" stroke="#2b3a5c"/>
<path d="M110 249 l6 6 12-12" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="145" y="252" font-size="14" font-weight="600" fill="#94a3b8">UNIQUE</text>
<text x="260" y="252" font-size="12" fill="#64748b">order.id UNIQUE</text>
</g>
<g>
<rect x="80" y="292" width="440" height="60" rx="12" fill="#111a30" stroke="#2b3a5c"/>
<rect x="80" y="292" width="440" height="60" rx="12" fill="#1e293b" opacity="0.5"/>
<rect x="100" y="308" width="28" height="28" rx="6" fill="#16223f" stroke="#2b3a5c"/>
<path d="M110 325 l6 6 12-12" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="145" y="328" font-size="14" font-weight="600" fill="#94a3b8">FK REF</text>
<text x="260" y="328" font-size="12" fill="#64748b">order.customer_id REFERENCES customer.id</text>
</g>
<g>
<rect x="80" y="368" width="440" height="60" rx="12" fill="#111a30" stroke="#2b3a5c"/>
<rect x="80" y="368" width="440" height="60" rx="12" fill="#1e293b" opacity="0.5"/>
<rect x="100" y="384" width="28" height="28" rx="6" fill="#16223f" stroke="#2b3a5c"/>
<path d="M110 401 l6 6 12-12" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="145" y="404" font-size="14" font-weight="600" fill="#94a3b8">ACCEPTED VALUES</text>
<text x="260" y="404" font-size="12" fill="#64748b">status IN ('active','pending')</text>
</g>

<!-- AI-native DQ side -->
<text x="900" y="90" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="3" fill="#34d399">AI-NATIVE DQ</text>
<text x="900" y="112" text-anchor="middle" font-size="12" fill="#6ee7b7">Context-aware quality</text>

<!-- knowledge graph -->
<circle cx="760" cy="220" r="22" fill="#16223f" stroke="#34d399" stroke-width="2"/>
<text x="760" y="226" text-anchor="middle" font-size="9" font-weight="600" fill="#34d399">order</text>
<circle cx="900" cy="180" r="22" fill="#16223f" stroke="#60a5fa" stroke-width="2"/>
<text x="900" y="186" text-anchor="middle" font-size="9" font-weight="600" fill="#60a5fa">customer</text>
<circle cx="1020" cy="220" r="22" fill="#16223f" stroke="#f59e0b" stroke-width="2"/>
<text x="1020" y="226" text-anchor="middle" font-size="9" font-weight="600" fill="#f59e0b">payment</text>
<circle cx="840" cy="300" r="22" fill="#16223f" stroke="#fb7185" stroke-width="2"/>
<text x="840" y="306" text-anchor="middle" font-size="9" font-weight="600" fill="#fb7185">product</text>
<circle cx="980" cy="310" r="22" fill="#16223f" stroke="#a78bfa" stroke-width="2"/>
<text x="980" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#a78bfa">inventory</text>
<circle cx="880" cy="400" r="22" fill="#16223f" stroke="#f472b6" stroke-width="2"/>
<text x="880" y="406" text-anchor="middle" font-size="9" font-weight="600" fill="#f472b6">shipment</text>

<!-- graph edges -->
<line x1="782" y1="222" x2="878" y2="186" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="922" y1="186" x2="998" y2="222" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="782" y1="228" x2="830" y2="290" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="862" y1="302" x2="958" y2="310" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="1000" y1="228" x2="988" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="860" y1="312" x2="878" y2="378" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="1002" y1="312" x2="890" y2="390" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
<line x1="782" y1="235" x2="878" y2="388" stroke="#34d399" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4"/>

<!-- glow around graph -->
<circle cx="890" cy="290" r="120" fill="none" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.15"/>

<!-- context label -->
<rect x="740" y="450" width="300" height="50" rx="30" fill="#0f172a" stroke="#34d399" stroke-opacity="0.4"/>
<text x="890" y="480" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#34d399">CONTEXT-AWARE KNOWLEDGE GRAPH</text>

<!-- bottom stat chips -->
<rect x="80" y="500" width="200" height="40" rx="10" fill="#111a30" stroke="#2b3a5c"/>
<text x="100" y="526" font-size="13" font-weight="700" fill="#64748b">100s</text>
<text x="140" y="526" font-size="10" letter-spacing="2" fill="#475569">MICRO-TESTS</text>

<rect x="320" y="500" width="220" height="40" rx="10" fill="#111a30" stroke="#2b3a5c"/>
<text x="340" y="526" font-size="13" font-weight="700" fill="#64748b">50%</text>
<text x="382" y="526" font-size="10" letter-spacing="2" fill="#475569">FALSE POSITIVES</text>

<rect x="680" y="500" width="200" height="40" rx="10" fill="#111a30" stroke="#2b3a5c"/>
<text x="700" y="526" font-size="13" font-weight="700" fill="#34d399">1</text>
<text x="725" y="526" font-size="10" letter-spacing="2" fill="#6ee7b7">KNOWLEDGE GRAPH</text>

<rect x="920" y="500" width="200" height="40" rx="10" fill="#111a30" stroke="#2b3a5c"/>
<text x="940" y="526" font-size="13" font-weight="700" fill="#34d399">3x</text>
<text x="972" y="526" font-size="10" letter-spacing="2" fill="#6ee7b7">CONTEXT ACCURACY</text>

<!-- MCP badge -->
<rect x="680" y="140" width="160" height="30" rx="15" fill="#111a30" stroke="#a78bfa" stroke-opacity="0.4"/>
<text x="760" y="160" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="2" fill="#a78bfa">MCP PROTOCOL</text>
<line x1="700" y1="160" x2="760" y2="196" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.5"/>
</g>
</svg>
