<rect x="936" y="214" width="160" height="10" rx="5" fill="#2b3a5c"/>
<circle cx="1180" cy="219" r="10" fill="#34d399"/><path d="M1176 219 l3 4 l7 -8" fill="none" stroke="#0b1120" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="936" y="252" width="130" height="10" rx="5" fill="#2b3a5c"/>
<circle cx="1180" cy="257" r="10" fill="#34d399"/><path d="M1176 257 l3 4 l7 -8" fill="none" stroke="#0b1120" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="928" y="282" width="224" height="34" rx="8" fill="#f59e0b" fill-opacity="0.09"/>
<rect x="936" y="294" width="146" height="10" rx="5" fill="#4a3a1e"/>
<path d="M1180 288 l10 17 h-20 z" fill="#f59e0b"/><rect x="1178" y="295" width="4" height="7" rx="2" fill="#1a1405"/><circle cx="1180" cy="305" r="2" fill="#1a1405"/>
<rect x="936" y="332" width="152" height="10" rx="5" fill="#2b3a5c"/>
<circle cx="1180" cy="337" r="10" fill="#34d399"/><path d="M1176 337 l3 4 l7 -8" fill="none" stroke="#0b1120" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="936" y="370" width="120" height="10" rx="5" fill="#2b3a5c"/>
<circle cx="1180" cy="375" r="10" fill="#34d399"/><path d="M1176 375 l3 4 l7 -8" fill="none" stroke="#0b1120" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<rect x="936" y="404" width="130" height="32" rx="16" fill="#0d2b22" stroke="#34d399"/>
<text x="1001" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">97.2% MATCHED</text>
<text x="600" y="560" text-anchor="middle" font-size="12" letter-spacing="4" fill="#64748b">CROSS-CLOUD RECONCILIATION &#183; AWS + AZURE + GCP + ON-PREM</text>
