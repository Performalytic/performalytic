<text x="396" y="104" font-size="12" letter-spacing="3" fill="#4285f4">GCP</text>
<g>
<circle cx="402" cy="132" r="4" fill="#4285f4"/><rect x="416" y="127" width="98" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="402" cy="162" r="4" fill="#4285f4"/><rect x="416" y="157" width="84" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="402" cy="192" r="4" fill="#34a853"/><rect x="416" y="187" width="106" height="9" rx="4.5" fill="#0b2d1c"/>
<rect x="402" y="210" width="170" height="1" fill="#2b3a5c"/>
