</g>
<!-- On-Prem -->
<rect x="370" y="280" width="230" height="170" rx="16" fill="#111a30" stroke="#64748b" stroke-opacity="0.5"/>
<text x="396" y="314" font-size="12" letter-spacing="3" fill="#94a3b8">ON-PREM</text>
<g>
<circle cx="402" cy="342" r="4" fill="#94a3b8"/><rect x="416" y="337" width="98" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="402" cy="372" r="4" fill="#94a3b8"/><rect x="416" y="367" width="84" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="402" cy="402" r="4" fill="#fbbf24"/><rect x="416" y="397" width="106" height="9" rx="4.5" fill="#4a3a1e"/>
<rect x="402" y="420" width="170" height="1" fill="#2b3a5c"/>
<text x="402" y="442" font-size="10" fill="#3b4d75">3 tables &#183; 2.4M rows</text>
