<!-- arrows from sources to engine -->
<path d="M290 155 C340 155 360 200 398 280" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrG)"/>
<path d="M290 365 C340 365 360 340 398 320" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrG)"/>
<path d="M600 155 L650 155" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
<path d="M600 365 L650 365" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
