<rect x="60" y="280" width="230" height="170" rx="16" fill="#111a30" stroke="#0078d4" stroke-opacity="0.5"/>
<text x="86" y="314" font-size="12" letter-spacing="3" fill="#0078d4">AZURE</text>
<g>
<circle cx="92" cy="342" r="4" fill="#0078d4"/><rect x="106" y="337" width="98" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="92" cy="372" r="4" fill="#fbbf24"/><rect x="106" y="367" width="84" height="9" rx="4.5" fill="#4a3a1e"/>
