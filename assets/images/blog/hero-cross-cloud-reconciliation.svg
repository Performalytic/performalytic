<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t">
<title id="t">Cross-cloud data reconciliation across AWS, Azure, GCP, and on-prem</title>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#1b2540"/></linearGradient>
<linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
<radialGradient id="gb"><stop offset="0" stop-color="#2563eb" stop-opacity="0.2"/><stop offset="1" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
<radialGradient id="gp"><stop offset="0" stop-color="#7c3aed" stop-opacity="0.18"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
<radialGradient id="gg"><stop offset="0" stop-color="#10b981" stop-opacity="0.15"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></radialGradient>
<pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-opacity="0.05"/></pattern>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#7c3aed"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
</defs>
<rect width="1200" height="600" fill="url(#bg)"/>
<rect width="1200" height="600" fill="url(#grid)"/>
<ellipse cx="200" cy="200" rx="300" ry="260" fill="url(#gb)"/>
<ellipse cx="1000" cy="200" rx="300" ry="260" fill="url(#gp)"/>
<ellipse cx="600" cy="500" rx="400" ry="180" fill="url(#gg)"/>
<g font-family="Segoe UI, system-ui, sans-serif">
<!-- AWS -->
<rect x="60" y="70" width="230" height="170" rx="16" fill="#111a30" stroke="#ff9900" stroke-opacity="0.5"/>
<text x="86" y="104" font-size="12" letter-spacing="3" fill="#ff9900">AWS</text>
<g>
<circle cx="92" cy="132" r="4" fill="#ff9900"/><rect x="106" y="127" width="98" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="92" cy="162" r="4" fill="#ff9900"/><rect x="106" y="157" width="84" height="9" rx="4.5" fill="#2b3a5c"/>
<circle cx="92" cy="192" r="4" fill="#ff9900"/><rect x="106" y="187" width="106" height="9" rx="4.5" fill="#2b3a5c"/>
<rect x="92" y="210" width="170" height="1" fill="#2b3a5c"/>
