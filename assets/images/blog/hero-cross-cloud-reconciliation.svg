<circle cx="740" cy="300" r="10" fill="url(#brand)"/>
<text x="740" y="400" text-anchor="middle" font-size="11" letter-spacing="3" fill="#94a3b8">RECONCILIATION ENGINE</text>
<text x="740" y="416" text-anchor="middle" font-size="10" fill="#64748b">Schema Drift &#183; Row-Level Match &#183; Trust Score</text>
<!-- arrow out -->
<line x1="814" y1="300" x2="890" y2="300" stroke="#10b981" stroke-width="3.5" marker-end="url(#arrG)"/>
