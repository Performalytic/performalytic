<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t">
<title id="t">Databricks versus Snowflake — lakehouse and warehouse platforms compared</title>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1120"/><stop offset="1" stop-color="#1b2540"/></linearGradient>
<linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
<radialGradient id="gb"><stop offset="0" stop-color="#2563eb" stop-opacity="0.25"/><stop offset="1" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
<radialGradient id="gp"><stop offset="0" stop-color="#7c3aed" stop-opacity="0.22"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
<pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-opacity="0.06"/></pattern>
</defs>
<rect width="1200" height="600" fill="url(#bg)"/>
<rect width="1200" height="600" fill="url(#grid)"/>
<ellipse cx="260" cy="300" rx="420" ry="300" fill="url(#gb)"/>
<ellipse cx="940" cy="300" rx="420" ry="300" fill="url(#gp)"/>
<g font-family="Segoe UI, system-ui, sans-serif">
<!-- left: lakehouse -->
<rect x="110" y="110" width="400" height="380" rx="20" fill="#111a30" stroke="#2b3a5c"/>
<text x="310" y="178" text-anchor="middle" font-size="26" font-weight="800" fill="#e2e8f0">Databricks</text>
<text x="310" y="206" text-anchor="middle" font-size="14" letter-spacing="2" fill="#94a3b8">LAKEHOUSE &#183; ML &#183; STREAMING</text>
<g stroke="#0b1120" stroke-width="2">
<rect x="238" y="248" width="144" height="34" rx="8" fill="#60a5fa"/>
<rect x="196" y="290" width="110" height="34" rx="8" fill="#3b82f6"/>
<rect x="314" y="290" width="110" height="34" rx="8" fill="#3b82f6"/>
<rect x="156" y="332" width="100" height="34" rx="8" fill="#2563eb"/>
<rect x="264" y="332" width="100" height="34" rx="8" fill="#2563eb"/>
<rect x="372" y="332" width="92" height="34" rx="8" fill="#2563eb"/>
<rect x="156" y="374" width="308" height="34" rx="8" fill="#1d4ed8"/>
</g>
<text x="310" y="452" text-anchor="middle" font-size="12" letter-spacing="3" fill="#64748b">OPEN DATA LAKE FOUNDATION</text>
<!-- right: warehouse / snowflake -->
<rect x="690" y="110" width="400" height="380" rx="20" fill="#111a30" stroke="#2b3a5c"/>
<text x="890" y="178" text-anchor="middle" font-size="26" font-weight="800" fill="#e2e8f0">Snowflake</text>
<text x="890" y="206" text-anchor="middle" font-size="14" letter-spacing="2" fill="#94a3b8">WAREHOUSE &#183; SQL &#183; SHARING</text>
<g stroke="#a78bfa" stroke-width="4" stroke-linecap="round">
<g transform="rotate(0 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
<g transform="rotate(60 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
<g transform="rotate(120 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
<g transform="rotate(180 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
<g transform="rotate(240 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
<g transform="rotate(300 890 330)"><line x1="890" y1="330" x2="972" y2="330"/><line x1="944" y1="330" x2="958" y2="318"/><line x1="944" y1="330" x2="958" y2="342"/></g>
</g>
<circle cx="890" cy="330" r="11" fill="#c4b5fd"/>
<text x="890" y="452" text-anchor="middle" font-size="12" letter-spacing="3" fill="#64748b">ELASTIC CLOUD WAREHOUSE</text>
