<line x1="600" y1="130" x2="600" y2="240" stroke="#2b3a5c" stroke-dasharray="4 8"/>
<line x1="600" y1="360" x2="600" y2="470" stroke="#2b3a5c" stroke-dasharray="4 8"/>
<circle cx="600" cy="300" r="48" fill="#0b1120" stroke="url(#brand)" stroke-width="3"/>
<text x="600" y="310" text-anchor="middle" font-size="26" font-weight="800" fill="#e2e8f0">VS</text>
<text x="600" y="540" text-anchor="middle" font-size="13" letter-spacing="4" fill="#64748b">ARCHITECTURE &#183; PERFORMANCE &#183; PRICING &#183; USE CASES</text>
